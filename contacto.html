<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuantPath </title>
  <!--Icono de la Pagina-->
  <link rel="shortcut icon" href="/img/logo.png" type="image/png">
  <!--Bootstrap-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!--Link a CSS-->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
      <img src="img/logo.png" alt="logo" width="34" height="34" class="rounded">
      QuantPath
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="estrategia.html">Estrategia</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="stocks.html">Stocks</a></li>
        <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
      </ul>

      <a class="btn btn-primary-qp ms-lg-3 mt-3 mt-lg-0" href="contacto.html">
        Solicitar demo
      </a>
    </div>
  </div>
</nav>

<!-- ENCABEZADO CONTACTO -->
<header class="section">
  <div class="container text-center">
    <h1 class="fw-bold">Contacto</h1>
    <p class="text-muted-qp mb-0">
      Déjanos tus datos y nos pondremos en contacto contigo.
    </p>
  </div>
</header>

<!-- FORMULARIO -->
<section class="section pt-0">
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-lg-7 col-md-9">
        <div class="card-qp p-4 p-lg-5">
          <h3 class="fw-bold mb-4 text-center">Solicitar demo</h3>

          <form>
            <!-- Nombre -->
            <div class="mb-3">
              <label class="form-label text-muted-qp">Nombre</label>
              <input type="text" class="form-control" placeholder="Tu nombre" required>
            </div>

            <!-- Correo -->
            <div class="mb-3">
              <label class="form-label text-muted-qp">Correo</label>
              <input type="email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>

            <!-- Tipo de usuario -->
            <div class="mb-3">
              <label class="form-label text-muted-qp">Tipo de usuario</label>
              <select class="form-select" required>
                <option value="" selected disabled>Selecciona una opción</option>
                <option>Principiante</option>
                <option>Inversionista personal</option>
                <option>Inversionista profesional</option>
                <option>Otro</option>
              </select>
            </div>

            <!-- Mensaje -->
            <div class="mb-4">
              <label class="form-label text-muted-qp">Mensaje</label>
              <textarea class="form-control" rows="4" placeholder="Cuéntanos qué buscas..." required></textarea>
            </div>

            <!-- Botón -->
            <button type="submit" class="btn btn-primary-qp w-100 btn-lg">
              Enviar
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>
</section>

<!--Footer-->
<footer class="text-center py-3 mt-5" style="border-top: 1px solid rgba(255,255,255,.1);">
  <div class="container">
    <small class="text-muted-qp">
      Daniel Saenz Villanueva
    </small>
  </div>
</footer>

</body>
</html>
